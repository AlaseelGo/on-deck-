<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>On Deck — Daily Speaking Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #15161b;
    --card: #1d1f26;
    --card-edge: #2a2d37;
    --ink: #eceae4;
    --ink-dim: #8b8d97;
    --amber: #f2b705;
    --amber-dim: #8a6b1f;
    --rec: #e8442c;
    --teal: #2fb8a6;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    overscroll-behavior: none;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }

  .app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top,0) 20px env(safe-area-inset-bottom,0);
  }

  header{
    display:flex; justify-content:space-between; align-items:center;
    padding: 22px 2px 10px;
  }
  header .brand{
    font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-dim); font-family:'JetBrains Mono', monospace; font-weight:500;
  }
  .stats{
    display:flex; gap:14px; font-family:'JetBrains Mono', monospace; font-size:13px;
  }
  .stat{
    display:flex; flex-direction:column; align-items:center; min-width:44px;
  }
  .stat .n{ font-size:18px; font-weight:700; color: var(--amber); line-height:1.1; }
  .stat .l{ color: var(--ink-dim); font-size:10px; letter-spacing:0.05em; text-transform:uppercase; }

  main{
    flex:1; display:flex; flex-direction:column; justify-content:center; gap:26px;
    padding-bottom: 30px;
  }

  .card{
    position: relative;
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: 14px;
    padding: 34px 26px 28px;
    min-height: 200px;
    display:flex; flex-direction:column; justify-content:center;
    box-shadow: 0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .card::before{
    content:"";
    position:absolute; left:0; right:0; top:0;
    height: 6px;
    background: repeating-linear-gradient(90deg, transparent 0 8px, var(--card-edge) 8px 9px);
    border-radius: 14px 14px 0 0;
    opacity:0.6;
  }
  .card .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; color: var(--amber-dim); margin-bottom:14px;
  }
  .card .topic{
    font-size: 26px; line-height:1.32; font-weight:600; color: var(--ink);
  }
  .card .cat{
    margin-top:18px; font-family:'JetBrains Mono', monospace; font-size:11px;
    color: var(--ink-dim); text-transform:uppercase; letter-spacing:0.06em;
  }

  .rec-zone{
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .rec-btn{
    position:relative;
    width:96px; height:96px; border-radius:50%;
    border: none; cursor:pointer;
    background: var(--amber);
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease, background .2s ease;
  }
  .rec-btn:active{ transform: scale(0.94); }
  .rec-btn.recording{ background: var(--rec); }
  .rec-btn .dot{ width:30px; height:30px; border-radius:8px; background: var(--bg); transition: all .2s ease; }
  .rec-btn.recording .dot{ border-radius:4px; width:26px; height:26px; }
  .ring{
    position:absolute; inset:-10px; border-radius:50%;
    border: 2px solid var(--rec); opacity:0;
  }
  .rec-btn.recording .ring{ animation: pulse 1.4s ease-out infinite; }
  @keyframes pulse{
    0%{ opacity:0.7; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.45); }
  }
  .rec-label{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--ink-dim); letter-spacing:0.04em; }
  .timer{ font-family:'JetBrains Mono', monospace; font-size:15px; color: var(--ink); min-height:20px; }

  .download-wrap{ display:flex; justify-content:center; }
  .dl-btn{
    font-family:'JetBrains Mono', monospace; font-size:13px; font-weight:700;
    letter-spacing:0.04em; text-transform:uppercase;
    background: var(--teal); color:#0d1614; border:none; border-radius:8px;
    padding: 13px 22px; cursor:pointer;
  }
  .dl-btn:active{ transform: scale(0.98); }

  .note{
    text-align:center; font-family:'JetBrains Mono', monospace; font-size:11.5px;
    color: var(--ink-dim); line-height:1.5;
  }

  .history-toggle{
    text-align:center; font-family:'JetBrains Mono', monospace; font-size:12px;
    color: var(--ink-dim); text-decoration:underline; text-underline-offset:3px;
    cursor:pointer; padding: 10px 0 24px;
  }
  .history{
    display:none; border-top:1px solid var(--card-edge); padding-top:16px; margin-bottom:20px;
  }
  .history.open{ display:block; }
  .history h3{
    font-family:'JetBrains Mono', monospace; font-size:11px; text-transform:uppercase;
    letter-spacing:0.08em; color: var(--ink-dim); margin:0 0 10px;
  }
  .history-item{
    display:flex; justify-content:space-between; gap:10px;
    font-size:13.5px; padding:8px 0; border-bottom:1px solid var(--card-edge);
  }
  .history-item .t{ color: var(--ink); }
  .history-item .d{ font-family:'JetBrains Mono', monospace; font-size:11px; color: var(--ink-dim); white-space:nowrap; }
  .empty{ font-family:'JetBrains Mono', monospace; font-size:12px; color: var(--ink-dim); text-align:center; padding: 10px 0; }

  .toast{
    position: fixed; left:50%; bottom:24px; transform: translateX(-50%);
    background: var(--card); border:1px solid var(--card-edge); color: var(--ink);
    font-family:'JetBrains Mono', monospace; font-size:12.5px;
    padding: 10px 16px; border-radius:8px; opacity:0; pointer-events:none;
    transition: opacity .25s ease; max-width: 90%; text-align:center;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">On Deck</div>
    <div class="stats">
      <div class="stat"><span class="n" id="streakN">0</span><span class="l">Streak</span></div>
      <div class="stat"><span class="n" id="totalN">0</span><span class="l">Total</span></div>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="eyebrow" id="cardEyebrow">Today's topic</div>
      <div class="topic" id="topicText">Loading topic…</div>
      <div class="cat" id="topicCat"></div>
    </div>

    <div class="rec-zone">
      <button class="rec-btn" id="recBtn"><div class="ring"></div><div class="dot"></div></button>
      <div class="rec-label" id="recLabel">Tap to start speaking</div>
      <div class="timer mono" id="timer">00:00</div>
      <div class="download-wrap" id="dlWrap" style="display:none;">
        <button class="dl-btn" id="dlBtn">Download recording</button>
      </div>
    </div>

    <div class="note">No prep, no re-takes needed. Just talk about it for as long as you want, then download and move on.</div>
  </main>

  <div class="history-toggle" id="historyToggle">View past topics ▾</div>
  <div class="history" id="history">
    <h3>Past topics</h3>
    <div id="historyList"><div class="empty">Nothing yet — finish today's topic to start your log.</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOPICS = [

["Argue for or against remote learning versus in-person classes.","Opinions"],
["Share your honest opinion on whether luck plays a bigger role in success than people admit.","Opinions"],

["Give your take on whether privacy is already dead in the modern world.","Opinions"],
["Argue whether failure is actually necessary for growth.","Opinions"],
["Share your opinion on whether religion and science can fully coexist.","Opinions"],
// Hypotheticals / what-if
["What would you do if you woke up tomorrow with no memory of the last year?","Hypothetical"],
["If you could instantly master one skill, what would it be and why?","Hypothetical"],
["What if you had to leave your phone behind for a month — what changes?","Hypothetical"],
["If you could redesign one thing about how universities work, what would it be?","Hypothetical"],
["What would you do with an extra two hours every single day?","Hypothetical"],
["If you had to move to a new country tomorrow, what would you miss most?","Hypothetical"],
["What if gravity was 20% weaker — how would daily life change?","Hypothetical"],
["If you could talk to yourself five years ago, what would you say?","Hypothetical"],

["If you had unlimited funding for one project, what would you build?","Hypothetical"],
["What if you could only speak the truth for the rest of your life?","Hypothetical"],
["If humanity found a habitable planet tomorrow, should we go?","Hypothetical"],
["What would you do differently if failure had zero consequences?","Hypothetical"],
["If you could relive one day exactly as it happened, which day and why?","Hypothetical"],
["What if AI became self-aware tomorrow — what should happen next?","Hypothetical"],
// Tech
["Explain how you'd describe what AI is to someone who's never heard of it.","Tech"],
["Talk about a piece of technology you couldn't live without.","Tech"],
["Explain the difference between a good app and a bad one, with examples.","Tech"],
["Describe what your dream piece of tech would do.","Tech"],
["Talk about whether coding should be taught in schools from a young age.","Tech"],
["Explain how a search engine actually finds what you're looking for.","Tech"],
["Talk about the most impressive piece of technology you've seen this year.","Tech"],
["Describe how you'd explain the internet to someone from 200 years ago.","Tech"],
["Talk about whether you trust AI-generated content.","Tech"],
["Explain what makes a video game addictive, from a design perspective.","Tech"],
["Describe a technology that scares you a little.","Tech"],
["Talk about how modding or building your own tools has changed how you learn.","Tech"],
["Explain what open-source software is and why it matters.","Tech"],
["Describe how automation is changing an industry you care about.","Tech"],

// Storytelling
["Tell a short made-up story that starts with 'The door was already open.'","Storytelling"],

// Debate / persuasion
["Convince someone that waking up early is worth it.","Debate"],
["Make the case that failure is more valuable than success.","Debate"],

["Make the case for why slowing down is sometimes the fastest way forward.","Debate"],

["Make the case that boredom is actually good for you.","Debate"],
["Argue why learning a second language is worth the effort.","Debate"],
["Try to convince someone that their first plan probably isn't their best plan.","Debate"],
// Memory / reflection
["Talk about a moment you were proud of yourself.","Reflection"],
["Describe a mistake that taught you something important.","Reflection"],
["Talk about someone who influenced how you think.","Reflection"],
["Describe a moment when you changed your mind about something big.","Reflection"],
["Talk about a challenge you're currently working through.","Reflection"],
["Describe a place that feels meaningful to you and why.","Reflection"],
["Talk about a goal you're chasing right now and why it matters to you.","Reflection"],
["Describe a skill you've improved a lot at over time.","Reflection"],
["Talk about a piece of advice you'd give your younger self.","Reflection"],
["Describe a moment where you had to speak up even though it was hard.","Reflection"],
// Random / fun
["Explain why pineapple does or doesn't belong on pizza — commit to a side.","Random"],
["Describe your perfect fictional universe to live in for a week.","Random"],
["Talk about the most underrated everyday object and why it deserves more credit.","Random"],
["Explain which fictional character would make the worst roommate.","Random"],
["Describe how you'd spend a day with no responsibilities at all.","Random"],
["Talk about a song that instantly changes your mood, and why.","Random"],
["Explain why a specific animal would make a terrible pet.","Random"],
["Describe the weirdest compliment you could give someone.","Random"],
["Talk about what your name would be if you were a superhero.","Random"],
["Explain your theory on why time feels faster as you get older.","Random"],
["Describe a smell that instantly brings back a memory.","Random"],
["Talk about the most useless talent a person could have.","Random"],
["Explain how you'd survive a day stranded with only three items.","Random"],
["Describe the strangest rule you'd add if you ran the world for a day.","Random"],
["Talk about a food combination people judge you for liking.","Random"]

const STORAGE_KEY = 'ondeck-progress';
let progress = null;
let mediaRecorder = null;
let chunks = [];
let recording = false;
let timerInterval = null;
let secondsElapsed = 0;
let currentTopicText = '';
let stream = null;

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(a,b){
  const d1 = new Date(a), d2 = new Date(b);
  return Math.round((d2-d1)/86400000);
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function loadProgress(){
  try{
    const res = await window.storage.get('progress', false);
    progress = JSON.parse(res.value);
  }catch(e){
    progress = { streak:0, total:0, lastCompletedDate:null, usedIndices:[], history:[], todayIndex:null, todayDate:null, completedToday:false };
  }
}
async function saveProgress(){
  try{
    await window.storage.set('progress', JSON.stringify(progress), false);
  }catch(e){ console.error('save failed', e); }
}

function pickTopicIndex(){
  let pool = [];
  for(let i=0;i<TOPICS.length;i++){ if(!progress.usedIndices.includes(i)) pool.push(i); }
  if(pool.length === 0){
    // cycled through everything — reset, but avoid immediate repeat of last used
    const last = progress.usedIndices[progress.usedIndices.length-1];
    progress.usedIndices = [];
    pool = TOPICS.map((_,i)=>i).filter(i=>i!==last);
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function ensureTodayTopic(){
  const today = todayStr();
  if(progress.todayDate !== today){
    // new day — pick a fresh topic, roll streak logic based on completion of previous day
    if(progress.lastCompletedDate){
      const gap = daysBetween(progress.lastCompletedDate, today);
      if(gap > 1){ progress.streak = 0; }
    }
    progress.todayDate = today;
    progress.todayIndex = pickTopicIndex();
    progress.completedToday = false;
  }
}

function renderTopic(){
  const [text, cat] = TOPICS[progress.todayIndex];
  currentTopicText = text;
  document.getElementById('topicText').textContent = text;
  document.getElementById('topicCat').textContent = cat;
  document.getElementById('cardEyebrow').textContent = progress.completedToday ? "Today's topic — done ✓" : "Today's topic";
}

function renderStats(){
  document.getElementById('streakN').textContent = progress.streak;
  document.getElementById('totalN').textContent = progress.total;
}

function renderHistory(){
  const list = document.getElementById('historyList');
  if(!progress.history.length){
    list.innerHTML = '<div class="empty">Nothing yet — finish today\'s topic to start your log.</div>';
    return;
  }
  list.innerHTML = progress.history.slice().reverse().map(h =>
    `<div class="history-item"><span class="t">${h.topic}</span><span class="d mono">${h.date}</span></div>`
  ).join('');
}

function formatTime(s){
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function sanitizeFilename(text){
  return text
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .slice(0, 60);
}

async function startRecording(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }catch(e){
    showToast("Mic access denied — enable it in your browser settings.");
    return;
  }
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
  mediaRecorder.onstop = onRecordingStop;
  mediaRecorder.start();
  recording = true;
  secondsElapsed = 0;
  document.getElementById('timer').textContent = '00:00';
  timerInterval = setInterval(()=>{
    secondsElapsed++;
    document.getElementById('timer').textContent = formatTime(secondsElapsed);
  }, 1000);
  const btn = document.getElementById('recBtn');
  btn.classList.add('recording');
  document.getElementById('recLabel').textContent = 'Tap to stop';
  document.getElementById('dlWrap').style.display = 'none';
}

function stopRecording(){
  if(mediaRecorder && recording){
    mediaRecorder.stop();
  }
  recording = false;
  clearInterval(timerInterval);
  const btn = document.getElementById('recBtn');
  btn.classList.remove('recording');
  document.getElementById('recLabel').textContent = 'Tap to record again';
  if(stream){ stream.getTracks().forEach(t=>t.stop()); }
}

function onRecordingStop(){
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const url = URL.createObjectURL(blob);
  const dlBtn = document.getElementById('dlBtn');
  const filename = sanitizeFilename(currentTopicText) + '.webm';
  dlBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    markCompleted();
  };
  document.getElementById('dlWrap').style.display = 'flex';
}

function markCompleted(){
  if(progress.completedToday) { showToast('Saved — already logged for today.'); return; }
  progress.completedToday = true;
  progress.total += 1;
  progress.streak += 1;
  progress.lastCompletedDate = progress.todayDate;
  if(!progress.usedIndices.includes(progress.todayIndex)) progress.usedIndices.push(progress.todayIndex);
  progress.history.push({ topic: currentTopicText, date: progress.todayDate });
  saveProgress();
  renderStats();
  renderHistory();
  renderTopic();
  showToast('Nice work — streak updated 🔥');
}

document.getElementById('recBtn').addEventListener('click', () => {
  if(!recording) startRecording(); else stopRecording();
});
document.getElementById('historyToggle').addEventListener('click', () => {
  const h = document.getElementById('history');
  h.classList.toggle('open');
  document.getElementById('historyToggle').textContent = h.classList.contains('open') ? 'Hide past topics ▴' : 'View past topics ▾';
});

(async function init(){
  await loadProgress();
  ensureTodayTopic();
  await saveProgress();
  renderTopic();
  renderStats();
  renderHistory();
})();
</script>
</body>
</html>
